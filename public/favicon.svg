<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Book spine -->
  <rect x="5" y="4" width="4" height="24" rx="1.5" fill="#6B3A2A"/>
  <!-- Book cover -->
  <rect x="9" y="4" width="18" height="24" rx="1.5" fill="#8B4A35"/>
  <!-- Book pages (right edge) -->
  <rect x="25" y="5" width="2" height="22" rx="0.5" fill="#FFE8DF" opacity="0.6"/>
  <!-- Decorative lines on cover -->
  <rect x="12" y="10" width="10" height="1.5" rx="0.75" fill="#FFE8DF" opacity="0.5"/>
  <rect x="12" y="14" width="7" height="1.5" rx="0.75" fill="#FFE8DF" opacity="0.5"/>
</svg>
